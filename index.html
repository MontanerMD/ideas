<body class="bg-slate-50 font-sans text-slate-900 selection:bg-blue-200 selection:text-blue-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          ShieldAlert, ListChecks, Newspaper, Stethoscope, ChevronDown, ChevronUp, Share2, Clock,
          Briefcase, MessageSquare, Scale, GraduationCap, Users, Shield, FileText, Activity, Banknote,
          Search, Microscope, Gavel, MonitorPlay, Syringe, ExternalLink, Info, AlertTriangle
        } from 'lucide-react';

        const demands = [
          { id: 1, category: 'Jurídico', title: '1. Estatuto Médico Propio (Fuera de la Ley 55/2003)', description: 'La asimetría civil y penal del acto médico (diagnóstico, indicación quirúrgica, alta) no puede regularse por el mismo estatuto que un auxiliar administrativo. Exigimos la salida del Estatuto Marco y una negociación bilateral con el Ministerio, fuera de la Mesa General dominada por CCOO y UGT.', icon: <Gavel className="w-6 h-6 text-indigo-500" /> },
          { id: 2, category: 'Retributivo', title: '2. Creación del Nivel A1 Plus (MECES 3)', description: 'El Grado en Medicina (360 ECTS) equivale a un Máster oficial (MECES 3). Compartir subgrupo administrativo con grados de 240 ECTS es un agravio. El A1 Plus debe reflejarse en un incremento lineal del sueldo base y de los trienios.', icon: <Banknote className="w-6 h-6 text-amber-500" /> },
          { id: 3, category: 'Laboral', title: '3. Jornada Estricta de 35h Semanales', description: 'Transposición real de la Directiva 2003/88/CE. Eliminación del cómputo irregular y de los promedios semestrales que encubren semanas de 80 horas. Las 35 horas deben ser el límite real y absoluto de lunes a viernes.', icon: <Clock className="w-6 h-6 text-teal-500" /> },
          { id: 4, category: 'Guardias', title: '4. Fin de las Guardias de 24h (Turnos de 12h)', description: 'La fatiga extrema multiplica por tres los eventos adversos graves en cirugía. Sustitución progresiva del modelo de 24h por turnos estructurales de 12h para garantizar la seguridad clínica.', icon: <Activity className="w-6 h-6 text-red-500" /> },
          { id: 5, category: 'Guardias', title: '5. Voluntariedad y Pago al 150%', description: 'Las horas de guardia deben pagarse como horas extraordinarias (150% de la hora ordinaria) con plus de nocturnidad y festividad. Actualmente se paga por debajo del precio de la hora ordinaria base.', icon: <Banknote className="w-6 h-6 text-emerald-500" /> },
          { id: 6, category: 'Descanso', title: '6. Descanso Ininterrumpido de 24h', description: 'El descanso post-guardia no es un privilegio, es recuperación biológica. Debe ser de 24 horas reales, no recuperable y sin penalización en la jornada anual.', icon: <Clock className="w-6 h-6 text-blue-400" /> },
          { id: 7, category: 'MIR', title: '7. Derogación del RD 1146/2006', description: 'El residente no es mano de obra barata estructural. Elaboración de un nuevo Estatuto del Facultativo en Formación que penalice a las gerencias que usen a los MIR para cubrir ausencias de adjuntos.', icon: <GraduationCap className="w-6 h-6 text-purple-500" /> },
          { id: 8, category: 'MIR', title: '8. Supervisión MIR 100% Presencial', description: 'Garantía jurídica de presencia física del especialista adjunto. Registro obligatorio de supervisión para eximir al residente de responsabilidad penal derivada de la saturación de urgencias.', icon: <Shield className="w-6 h-6 text-slate-700" /> },
          { id: 9, category: 'MIR', title: '9. Recuperación Salarial del MIR (+25%)', description: 'El sueldo base del MIR roza el Salario Mínimo Interprofesional. Exigimos una subida salarial lineal del 25% para paliar la pérdida de poder adquisitivo acumulada desde 2009 y el cobro del grado de formación desde R1.', icon: <Scale className="w-6 h-6 text-purple-400" /> },
          { id: 10, category: 'Retributivo', title: '10. Devolución de la Paga Extra Íntegra', description: 'Fin del recorte impuesto en 2010 (Zapatero) que amputó hasta un 45% del sueldo base y trienios en las pagas extras del Grupo A1. Exigimos extras al 100%.', icon: <Banknote className="w-6 h-6 text-emerald-600" /> },
          { id: 11, category: 'Asistencial', title: '11. Límite Innegociable de Agendas', description: 'Máximo 30 pacientes/día en Atención Primaria (15 min/paciente) y 25 en Pediatría. En los hospitales, agendas ajustadas a la complejidad sin dobles huecos ni "bisecciones".', icon: <Users className="w-6 h-6 text-rose-500" /> },
          { id: 12, category: 'Asistencial', title: '12. Prohibición de Reparto de Cupos', description: 'La ausencia de un facultativo (baja, vacaciones) no se puede solucionar "repartiendo" a sus pacientes entre los compañeros que ya están al 100% de capacidad. Contratación de pools estructurales de sustitución.', icon: <ListChecks className="w-6 h-6 text-rose-400" /> },
          { id: 13, category: 'Cirugía', title: '13. Blindaje del Tiempo de Quirófano', description: 'El cirujano precisa mantener destreza técnica. Exigimos tiempo quirúrgico protegido dentro de la jornada ordinaria y dimensionamiento de camas UCI/REA para evitar la cancelación de cirugías oncológicas.', icon: <Syringe className="w-6 h-6 text-red-600" /> },
          { id: 14, category: 'Formativo', title: '14. 20% del Tiempo para I+D+i y Docencia', description: 'La Medicina Basada en la Evidencia (MBE) requiere estudio constante (ej. actualización en técnicas como TaTME en coloproctología). El 20% de la jornada debe estar protegido por ley para no investigar en el tiempo personal.', icon: <Microscope className="w-6 h-6 text-indigo-500" /> },
          { id: 15, category: 'Jurídico', title: '15. Exención de Responsabilidad por Colapso', description: 'Cobertura legal total cuando el error clínico derive de la sobrecarga extrema impuesta por la dirección (ej. pacientes en pasillos, falta de camas, ratios ilegales). La responsabilidad penal debe ser subsidiaria de la Administración.', icon: <Gavel className="w-6 h-6 text-slate-800" /> },
          { id: 16, category: 'Digital', title: '16. Regulación Ética de la IA y Salud Digital', description: 'La IA y la telemedicina deben ser herramientas auditadas clínicamente por la AEMPS, utilizadas como soporte y nunca impuestas por las gerencias como triaje "low-cost" para ahorrar en contrataciones.', icon: <MonitorPlay className="w-6 h-6 text-cyan-500" /> },
          { id: 17, category: 'Asistencial', title: '17. Fin del Modelo de Peonadas a Destajo', description: 'La reducción de listas de espera no se puede basar en operar de tarde con fatiga acumulada. Apertura estructural de quirófanos de tarde con plantillas estables.', icon: <Syringe className="w-6 h-6 text-red-400" /> },
          { id: 18, category: 'Jubilación', title: '18. Jubilación Anticipada a los 60 Años', description: 'Aplicación del RD 1698/2011 por penosidad, toxicidad y trabajo a turnos nocturnos. El estrés quirúrgico y clínico justifican el derecho al retiro íntegro a los 60 años.', icon: <Activity className="w-6 h-6 text-emerald-500" /> },
          { id: 19, category: 'Jubilación', title: '19. Cómputo Doble de las Horas de Guardia', description: 'Las miles de horas de guardia realizadas de noche y festivos deben cotizar y computar íntegramente como tiempo trabajado para la vida laboral y la pensión máxima.', icon: <Clock className="w-6 h-6 text-teal-600" /> },
          { id: 20, category: 'Laboral', title: '20. Exención Voluntaria de Guardias > 55 Años', description: 'Garantía real del derecho sin que suponga un castigo retributivo. Implantación obligatoria de módulos de tarde (actividad clínica o investigadora) para compensar la exención.', icon: <ShieldAlert className="w-6 h-6 text-amber-500" /> },
          { id: 21, category: 'Retributivo', title: '21. Carrera Profesional Homogénea', description: 'Mismos baremos en todo el Sistema Nacional de Salud. Pago efectivo e inmediato en todos los grados a los médicos interinos, cumpliendo con la jurisprudencia europea.', icon: <Briefcase className="w-6 h-6 text-blue-500" /> },
          { id: 22, category: 'Retributivo', title: '22. Fin de la Penalización por Exclusividad', description: 'Eliminación del descuento en el Complemento Específico a los médicos que ejercen en la sanidad privada en su tiempo libre. Es una injerencia inconstitucional.', icon: <Scale className="w-6 h-6 text-slate-500" /> },
          { id: 23, category: 'Gestión', title: '23. Profesionalización de la Gestión Clínica', description: 'Las Jefaturas de Servicio y Direcciones Médicas deben ser adjudicadas por concurso público de méritos técnicos y científicos, no por libre designación política (dedocracia).', icon: <ListChecks className="w-6 h-6 text-indigo-400" /> },
          { id: 24, category: 'Salud Mental', title: '24. Burnout como Enfermedad Profesional', description: 'El Síndrome de Desgaste Profesional y el TEPT derivado de presión asistencial deben ser catalogados y cubiertos como enfermedades profesionales por las mutuas de accidentes de trabajo.', icon: <Stethoscope className="w-6 h-6 text-pink-500" /> },
          { id: 25, category: 'Asistencial', title: '25. Creación de PACs 24h y Dotación de Urgencias', description: 'Filtro efectivo previo a la urgencia hospitalaria. Dotación de celadores, seguridad y personal médico suficiente para detener el incremento de agresiones en PACs y Hospitales.', icon: <Shield className="w-6 h-6 text-red-700" /> }
        ];

        const argumentsList = [
          { id: 1, category: 'Fatiga y Guardias', q: '¿Por qué sois el único colectivo que rechaza el límite de 17 horas del Gobierno?', a: 'Porque contiene la trampa "salvo necesidades asistenciales". En un sistema colapsado, esa cláusula legaliza que nos sigan obligando a hacer 24h o 36h seguidas. El límite debe ser estricto y de 12h.' },
          { id: 2, category: 'Cirugía', q: 'Si canceláis las cirugías programadas estáis jugando con la salud de la gente.', a: 'El riesgo real es que te opere un cirujano de cáncer colorrectal que lleva 20 horas sin dormir. La huelga suspende quirófanos hoy para exigir que mañana operemos en condiciones de seguridad, aplicando la MBE, no la resistencia bélica.' },
          { id: 3, category: 'Retribución', q: 'Ya cobráis mucho, sois el A1.', a: 'Nuestro sueldo base es de los más bajos de la UE. Lo que nos eleva la nómina son las horas extra (guardias) trabajadas de madrugada y pagadas por debajo del precio de la hora diurna. Exigimos el nivel A1 Plus que refleje nuestros 11 años de formación.' },
          { id: 4, category: 'MIR', q: 'Los residentes se quejan pero así fue la medicina siempre.', a: 'La esclavitud no se justifica por la tradición. Usar a un R2 para sacar el trabajo de dos adjuntos en la puerta de urgencias a base de amenazas académicas es un delito, no un plan de estudios.' },
          { id: 5, category: 'Pacientes', q: 'Asociaciones de Pacientes quieren mediar, ¿por qué las vetáis?', a: 'Porque el paciente es la parte afectada por las listas de espera, pero el conflicto es laboral (trabajador vs. estado). La mediación requiere conocimientos de Derecho Laboral y Sanitario, no escudos humanos por parte del Ministerio.' },
          { id: 6, category: 'Gestión', q: 'El Estado no tiene dinero para pagar vuestras 25 demandas.', a: 'Hay dinero para rescatar peajes y empresas privadas. La sanidad se desmantela por decisión política, priorizando el ahorro sobre la vida. Contratar médicos es inversión rentable, acorta estancias en UCI y reduce complicaciones.' },
          { id: 7, category: 'Sindicatos', q: 'UGT y CCOO firmaron el Estatuto, ¿sois unos elitistas?', a: 'CCOO y UGT representan a la mayoría no médica del hospital. Nuestro riesgo penal, civil y nivel de estrés biológico no puede ser diluido en los votos de quien no va al juzgado si la anastomosis del colon falla. Queremos Estatuto propio.' },
          { id: 8, category: 'Investigación', q: 'Queréis un 20% de la jornada para investigar y no ver enfermos.', a: 'La Medicina sin estudio es peligrosa. Si un coloproctólogo no dedica tiempo a leer las guías de NCCN o aprender técnica TaTME, ofrecerá medicina obsoleta. Estudiar salva más vidas que ver enfermos en 3 minutos.' },
          { id: 9, category: 'Telemedicina', q: 'La inteligencia artificial y las citas telefónicas van a solucionar las demoras.', a: 'La tecnología complementa, no sustituye. Un abdomen agudo no se diagnostica por teléfono. La gerencia usa la telemedicina para camuflar que faltan médicos en la consulta, convirtiendo el acto médico en un call-center peligroso.' },
          { id: 10, category: 'Jubilación', q: 'Jubilaros a los 60 años es un lujo cuando el resto va a los 67.', a: 'A los 60 años, con 4 guardias al mes desde los 25, ya trabajamos las horas de la vida laboral de una persona de 75 años. La privación de sueño acorta la esperanza de vida. No es un lujo, es un coeficiente reductor biológico por penosidad.' },
          { id: 11, category: 'Fatiga y Guardias', q: 'Pero las guardias se pueden dormir en el hospital si no hay avisos.', a: 'Mito absoluto. En un hospital moderno la presión de la urgencia no para. Además, el sueño fragmentado en estado de alerta (vigilancia) impide la entrada en fases profundas del sueño, el daño neurocognitivo es el mismo.' },
          { id: 12, category: 'Cirugía', q: 'Si limitamos los quirófanos a las mañanas, la lista crece.', a: 'Por eso exigimos plantillas completas en turno de tarde (peonadas estructurales, no a destajo). El hospital tiene que estar abierto, pero no a costa del lomo del mismo cirujano que lleva allí desde las 8 de la mañana.' },
          { id: 13, category: 'MIR', q: 'Sin los residentes el hospital se cierra.', a: 'Cierto, y esa es la mayor prueba del fraude de ley. Un sistema formativo no puede ser la viga de carga de la atención continuada del Estado. Si un residente falta, no debería notarse en la asistencia, solo en su aula.' },
          { id: 14, category: 'Retribución', q: 'El pago al 150% de las guardias quiebra las autonomías.', a: 'Si cualquier trabajador del sector del metal cobra su hora extra a más valor que la ordinaria, ¿por qué la salud humana vale menos que reparar un coche? La dignidad empieza por la nómina.' },
          { id: 15, category: 'Estatuto', q: 'Queréis privilegios laborales fuera de la Función Pública.', a: 'Querremos garantías acordes a la responsabilidad. No puedes aplicarle el mismo reglamento de descanso a quien archiva papeles y a quien tiene que intubar a un bebé prematuro a las 5 de la madrugada.' },
          { id: 16, category: 'Pacientes', q: 'Un médico de familia viendo 50 pacientes al día también los cura.', a: 'No los cura, los desplaza. Viendo a un paciente cada 4 minutos solo da tiempo a firmar una receta o una baja. La hipermedicación y los diagnósticos tardíos oncológicos derivan de estas agendas criminales.' },
          { id: 17, category: 'Burnout', q: 'La ansiedad en el trabajo la tenemos todos, no solo los médicos.', a: 'La ansiedad de no llegar a objetivos no es igual al Trauma Moral de ver morir a un paciente porque tu gerencia no compró material o no abrió una cama de UCI. Ese daño psicológico es permanente.' },
          { id: 18, category: 'Investigación', q: 'Podéis investigar en los congresos, que os pagan los laboratorios.', a: 'Exacto, y eso genera un conflicto de interés que denunciamos. El Estado debería asumir la formación continuada y el tiempo protegido para investigar con independencia total de la industria farmacéutica.' },
          { id: 19, category: 'Jurídico', q: 'Si cometéis un error, debéis ir al juzgado solos.', a: 'Si el error es impericia (Lex Artis), sí. Pero si yerro prescribiendo porque llevo 60 pacientes y la historia clínica electrónica falló, la culpa in vigilando y estructural es de la Consejería. Esos pleitos deberían pararlos ellos.' },
          { id: 20, category: 'Digital', q: 'El "Big Data" ayudará a prescindir de adjuntos veteranos.', a: 'El Big Data predice patrones poblacionales, no opera fístulas complejas ni da malas noticias con empatía. La tecnología sin supervisión clínica experta convierte las desviaciones estadísticas en cadáveres.' },
          { id: 21, category: 'Jornada', q: 'Promediar las horas en 6 meses cumple la ley europea.', a: 'La biología no promedia. El hígado o el corazón del médico que trabajó 90 horas una semana no se cura porque descanse en noviembre. Esa trampa legal aplasta nuestra salud cardiovascular.' },
          { id: 22, category: 'Peonadas', q: 'Operar por las tardes os da mucho dinero extra.', a: 'El sistema lo pervierte: paga para sacar lista mientras mantiene los quirófanos matinales cerrados por falta de celadores. La salud debe pagarse en la jornada base, no comprando nuestro descanso para tapar mala gestión.' },
          { id: 23, category: 'Política', q: 'La huelga médica es un ataque al partido del gobierno.', a: 'Es un ataque a la mala praxis administrativa, gobierne quien gobierne. Las leyes que combatimos (Ley 55/2003) fueron aprobadas por unos y el decreto de recortes de 2010 por otros. Nuestra lealtad es a la medicina.' },
          { id: 24, category: 'Exclusividad', q: 'Queréis cobrar la exclusividad pero trabajar en la privada.', a: 'La exclusividad es un secuestro del título. El resto de funcionarios pueden tener negocios fuera de horario sin que se les quite el complemento específico. Retenernos el dinero por operar fuera del horario público es un robo legalizado.' },
          { id: 25, category: 'Guardias', q: 'Sin guardias de 24h se rompe la continuidad asistencial.', a: 'La continuidad se logra con un buen traspaso de información (hand-over) e historias clínicas detalladas, no obligando a un humano a estar 24h en la UCI hasta que su cerebro no procese adecuadamente las dosis.' },
          { id: 26, category: 'Agresiones', q: 'Las agresiones a médicos son fruto de la frustración del paciente.', a: 'Y esa frustración la generan las listas de espera y el colapso de los PAC, no el médico. La Consejería nos expone sin guardias de seguridad como si fuésemos escudos humanos de su déficit presupuestario.' },
          { id: 27, category: 'Cirugía', q: '¿Por qué un cirujano precisa "tiempo quirúrgico protegido"?', a: 'Si haces mucha consulta y no pisas el quirófano, tu mano pierde memoria muscular (curva de aprendizaje en descenso). Un cirujano que no opera periódicamente deviene en un peligro para el paciente.' },
          { id: 28, category: 'Jubilación', q: 'Permitiros retiraros a los 55 es abandonar el sistema.', a: 'Es dejar de hacer noches, no abandonar el sistema. Los adjuntos mayores tienen un gran valor en la docencia y quirófanos de complejidad, pero su ritmo circadiano ya no soporta una guardia a pie de cama.' },
          { id: 29, category: 'Carrera', q: 'La carrera profesional encarece el sistema.', a: 'Recompensa la mejora técnica. Que un médico se esfuerce en publicar, auditar infecciones de herida quirúrgica y hacer doctorado salva dinero reduciendo morbilidad. Pagar esa excelencia es la mejor inversión.' },
          { id: 30, category: 'Atención Primaria', q: 'Los médicos de familia solo derivan al especialista.', a: 'Un buen médico de AP resuelve el 85% de los casos si le dan 15 minutos por paciente. Al darles 4 minutos, nos obliga a hacer medicina defensiva y derivar por no tener tiempo de explorar. Han destruido la puerta del sistema.' },
          { id: 31, category: 'MIR', q: 'El MIR está sobreprotegido por las unidades docentes.', a: 'Falso. Muchas direcciones presionan al tutor para que el MIR haga trabajo estructural. La formación se sacrifica por el asistencialismo barato.' },
          { id: 32, category: 'Gestión', q: 'Las jefaturas clínicas son buenos gestores.', a: 'Cuando la jefatura se elige a dedo por el gerente (afín político), el jefe obedece presupuestos, no la evidencia clínica. Queremos jefaturas por méritos opuestos y libres.' },
          { id: 33, category: 'Salario', q: 'El Grupo A1 abarca a muchos, ¿por qué sois especiales?', a: 'Ningún A1 tiene nuestra asimetría formativa y penal. Un ingeniero de caminos tiene la misma formación en años, pero el Nivel A1 Plus reconoce la responsabilidad directa sobre la vida en turnos extremos.' },
          { id: 34, category: 'Fatiga y Guardias', q: 'Una guardia de puerta en Urgencias tampoco es tan dura.', a: 'Ver 80 pacientes en una noche, filtrando infartos o sepsis entre cientos de catarros y ansiedades, es un terror biológico. La presión tritura el cerebro del facultativo.' },
          { id: 35, category: 'Digital', q: 'Las apps móviles harán de médicos 24/7.', a: 'La salud móvil solo aporta datos. Sin un médico con tiempo estructural para leer, interpretar y actuar sobre ese Big Data, las apps solo generan hiperfrecuentación e hipocondría.' },
          { id: 36, category: 'Burnout', q: 'El suicidio médico es un tabú.', a: 'Es una pandemia silenciada. La tasa de suicidio en facultativas es hasta un 130% superior a la población general. El sistema mata a su primera línea y después lo esconde.' },
          { id: 37, category: 'Pacientes', q: 'La huelga rompe la "relación médico-paciente".', a: 'La relación se rompe cuando el contrato del interino dura días y el paciente ve a un médico distinto cada martes. La huelga busca estabilizar plantillas para que el enfermo conozca a su médico.' },
          { id: 38, category: 'Peonadas', q: 'Los módulos de tarde vacían las urgencias.', a: 'Son un parche. Cuando se acaban los fondos del módulo, la lista vuelve a estallar. Solo sirven para que los políticos den ruedas de prensa temporales, mientras agotan a la plantilla.' },
          { id: 39, category: 'Estatuto', q: 'Estatuto propio significa menos flexibilidad.', a: 'Significa reglas de juego adaptadas. Permitirá contratar suplentes rápido, castigar la ineficiencia y primar el mérito quirúrgico sin la farragosa burocracia actual de la Función Pública General.' },
          { id: 40, category: 'Jurídico', q: 'Queréis blindaje total para ser impunes.', a: 'Queremos no ser culpables de la desinversión. Si tengo que reanimar con un desfibrilador que no se revisó, la culpa de que falle es de la gerencia, no de mi impericia técnica.' },
          { id: 41, category: 'Cirugía', q: 'Un cirujano en el quirófano tiene todo a su disposición.', a: 'La realidad es que operamos con material obsoleto, mendigando horas de bisturí armónico y sin celadores para mover al enfermo. La huelga también es por renovar la obsolescencia tecnológica.' },
          { id: 42, category: 'MIR', q: 'Subirle el 25% al sueldo MIR es excesivo.', a: 'Equivale a devolverlos al poder adquisitivo de la década de los 2000. Cuando alquilas un piso cerca de un hospital hoy, el sueldo base del MIR lo deja por debajo del umbral de pobreza urbana.' },
          { id: 43, category: 'Investigación', q: 'Para leer guías de cáncer, hacéis grupos en WhatsApp.', a: 'La divulgación informal no exime de la necesidad legal de hospitales dedicando recursos a sesiones multidisciplinares intra-jornada. El WhatsApp no protege legalmente las decisiones de comité.' },
          { id: 44, category: 'Guardias', q: '¿Cómo compensáis la diferencia de sueldo sin guardias?', a: 'Subiendo el sueldo base. La dependencia económica de las guardias para vivir dignamente es la pieza clave del chantaje del Ministerio para mantenernos durmiendo en sofás de hospital.' },
          { id: 45, category: 'Sindicatos', q: 'Si salís de la mesa sectorial, vais a perder derechos.', a: 'Los derechos que protege la mesa general son los que interesan a la masa laboral mayoritaria (vacaciones y moscosos), que están bien, pero ignoran los pleitos jurídicos de responsabilidad o la docencia, que son los nuestros.' },

                      </p>
                      <button 
                        onClick={() => copyToClipboard("Si los servicios mínimos son del 100%, la administración reconoce jurídicamente que el sistema sobrevive bajo mínimos todos los días laborables del año. Esta huelga exige condiciones biológicas para no cometer errores mortales por agotamiento en el quirófano. Curamos hoy el sistema con esta huelga para poder operarte con seguridad mañana.")}
                        className="w-full bg-slate-50 hover:bg-blue-50 text-slate-600 hover:text-blue-700 font-black py-3.5 rounded-xl border border-slate-200 transition-colors flex items-center justify-center gap-2 text-xs uppercase tracking-widest"
                      >
                        <Share2 className="w-4 h-4" /> Copiar para redes sociales
                      </button>
                    </div>

                    <div className="space-y-4">
                      <div className="flex justify-between items-center px-1">
                        <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest">Cronología de Hoy</h3>
                        <button onClick={() => setActiveTab('noticias')} className="text-[10px] font-black text-blue-600 hover:underline tracking-widest uppercase">Ver Diario Completo</button>
                      </div>
                      <div className="bg-white border border-slate-200 rounded-3xl p-5 shadow-sm hover:border-blue-300 transition-colors cursor-pointer group" onClick={() => setActiveTab('noticias')}>
                        <div className="flex justify-between items-start mb-3">
                          <span className="bg-red-50 text-red-600 border border-red-100 text-[9px] font-black px-2 py-1 rounded-md uppercase tracking-widest shadow-sm">{newsFeed[0].tag}</span>
                          <span className="text-[10px] text-slate-400 font-bold bg-slate-50 px-2 py-1 rounded border border-slate-100">{newsFeed[0].date}</span>
                        </div>
                        <h4 className="font-extrabold text-slate-800 text-lg mb-2 leading-tight group-hover:text-blue-700 transition-colors">{newsFeed[0].title}</h4>
                        <p className="text-slate-500 text-sm line-clamp-2 leading-relaxed text-justify">{newsFeed[0].summary}</p>
                      </div>
                    </div>
                  </div>
                );

              case 'demandas':
                const filteredDemands = demands.filter(d => d.title.toLowerCase().includes(searchQuery.toLowerCase()) || d.description.toLowerCase().includes(searchQuery.toLowerCase()));
                return (
                  <div className="space-y-6 animate-in fade-in duration-300 pb-24">
                    <header className="px-1 text-center sm:text-left mb-6">
                      <span className="text-blue-600 text-[10px] font-black tracking-[0.3em] uppercase block mb-2">Estructura Irrenunciable</span>
                      <h2 className="text-3xl font-black text-slate-900 mb-3 tracking-tight">Las 25 Demandas del Estatuto</h2>
                      <p className="text-slate-500 text-sm font-medium leading-relaxed text-justify sm:text-left">
                        Rebatidas punto por punto. Plataforma oficial de mínimos para abandonar la precariedad estructural de la Ley 55/2003 impuesta por los sindicatos de clase.
                      </p>
                    </header>

                    <div className="relative shadow-sm">
                      <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5" />
                      <input 
                        type="text" 
                        placeholder="Filtrar exigencias (ej. MIR, 24h, Jubilación...)" 
                        className="w-full bg-white border border-slate-200 rounded-2xl py-4 pl-12 pr-4 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all font-medium"
                        value={searchQuery}
                        onChange={(e) => setSearchQuery(e.target.value)}
                      />
                    </div>

                    <div className="grid grid-cols-1 gap-5">
                      {filteredDemands.map(demand => (
                        <div key={demand.id} className="bg-white border border-slate-200 rounded-3xl p-6 shadow-sm hover:shadow-md hover:border-blue-400 transition-all group">
                          <div className="flex items-start gap-4 mb-3">
                            <div className="bg-slate-50 p-3 rounded-2xl border border-slate-100 group-hover:bg-blue-50 group-hover:scale-110 transition-all flex-shrink-0">
                              {demand.icon}
                            </div>
                            <div className="pt-1">
                              <span className="text-[9px] font-black text-blue-500 uppercase tracking-widest bg-blue-50 px-2 py-0.5 rounded-md border border-blue-100">{demand.category}</span>
                              <h3 className="text-lg font-bold text-slate-800 leading-tight mt-2">{demand.title}</h3>
                            </div>
                          </div>
                          <p className="text-slate-600 text-sm leading-relaxed text-justify ml-16 sm:ml-0">{demand.description}</p>
                        </div>
                      ))}
                      {filteredDemands.length === 0 && (
                        <div className="text-center py-10 bg-white border border-slate-200 rounded-3xl">
                          <Search className="w-8 h-8 text-slate-300 mx-auto mb-3" />
                          <p className="text-slate-500 font-bold">Ninguna demanda coincide con los términos de búsqueda.</p>
                        </div>
                      )}
                    </div>
                  </div>
                );

              case 'argumentos':
                const filteredArgs = argumentsList.filter(a => a.q.toLowerCase().includes(searchQuery.toLowerCase()) || a.a.toLowerCase().includes(searchQuery.toLowerCase()));
                return (
                  <div className="space-y-6 animate-in fade-in duration-300 pb-24">
                    <header className="bg-gradient-to-br from-slate-900 to-indigo-900 p-6 rounded-3xl shadow-lg border border-slate-700 text-white relative overflow-hidden mb-8">
                      <div className="absolute top-0 right-0 w-32 h-32 bg-blue-500/20 rounded-full blur-[40px] -mr-16 -mt-16"></div>
                      <h2 className="text-2xl font-black mb-3">Los 100 Argumentos de Trinchera</h2>
                      <p className="text-slate-300 text-sm font-medium leading-relaxed text-justify">
                        <strong>Tu escudo dialéctico.</strong> Un arsenal con exactamente 100 respuestas contundentes, jurídicas y basadas en la evidencia médica. Diseñado para desmontar instantáneamente cualquier falacia gerencial, presión política o trampa mediática en los medios de comunicación.
                      </p>
                      <div className="mt-4 flex items-center gap-2">
                        <span className="bg-blue-600 text-white text-[10px] font-black px-3 py-1 rounded-full tracking-widest shadow-sm">100 / 100 CARGADOS</span>
                      </div>
                    </header>

                    <div className="relative shadow-sm">
                      <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5" />
                      <input 
                        type="text" 
                        placeholder="Busca por palabra clave (ej. Telemedicina, Cirugía, Riesgo...)" 
                        className="w-full bg-white border border-slate-300 rounded-2xl py-4 pl-12 pr-4 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all font-medium"
                        value={searchQuery}
                        onChange={(e) => setSearchQuery(e.target.value)}
                      />
                    </div>

                    <div className="space-y-4">
                      {filteredArgs.map((arg, idx) => (
                        <AccordionItem key={arg.id} question={`${arg.id}. ${arg.q}`} answer={arg.a} category={arg.category} onCopy={copyToClipboard} />
                      ))}
                      {filteredArgs.length === 0 && (
                        <div className="text-center py-10 bg-white border border-slate-200 rounded-3xl">
                          <p className="text-slate-500 font-bold">No se encontraron argumentos de esa temática en la trinchera.</p>
                        </div>
                      )}
                    </div>
                  </div>
                );

              case 'noticias':
                return (
                  <div className="space-y-6 animate-in fade-in duration-300 pb-24">
                    <header className="px-1 flex flex-col mb-6">
                      <div className="flex items-center justify-between mb-2">
                        <h2 className="text-3xl font-black text-slate-900 tracking-tight">Cuaderno de Bitácora</h2>
                        <span className="text-[9px] font-black text-emerald-600 bg-emerald-50 px-2 py-1 rounded-md border border-emerald-100 flex items-center gap-1.5 shadow-sm">
                          <Clock className="w-3 h-3" /> ACTUALIZACIÓN DINÁMICA
                        </span>
                      </div>
                      <p className="text-slate-500 text-sm font-medium leading-relaxed">
                        Registro cronológico de la lucha médica y resoluciones autonómicas, evaluado cada 24 horas.
                      </p>
                    </header>

                    <div className="space-y-8 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-blue-600 before:via-slate-200 before:to-transparent">
                      {newsFeed.map((news, index) => (
                        <div key={news.id} className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group pb-2">
                          <div className={`flex items-center justify-center w-10 h-10 rounded-full border-4 border-slate-50 bg-white shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 z-10 transition-transform ${index === 0 ? 'ring-4 ring-blue-100 animate-pulse' : 'group-hover:scale-110'}`}>
                            <div className={`w-3.5 h-3.5 rounded-full ${index === 0 ? 'bg-blue-600' : 'bg-slate-300'}`}></div>
                          </div>
                          <div className="w-[calc(100%-3rem)] md:w-[calc(50%-2.5rem)] bg-white p-6 rounded-3xl border border-slate-200 shadow-sm hover:shadow-lg hover:-translate-y-1 transition-all">
                            <div className="flex flex-wrap items-center justify-between gap-3 mb-3">
                              <span className={`text-[9px] font-black px-2 py-1 rounded-md uppercase tracking-widest shadow-sm ${
                                news.color === 'red' ? 'bg-red-50 text-red-600 border border-red-100' : 
                                news.color === 'blue' ? 'bg-blue-50 text-blue-600 border border-blue-100' : 
                                news.color === 'amber' ? 'bg-amber-50 text-amber-600 border border-amber-100' : 
                                'bg-slate-50 text-slate-600 border border-slate-100'
                              }`}>
                                {news.tag}
                              </span>
                              <span className="text-[10px] text-slate-400 font-bold flex items-center gap-1.5 bg-slate-50 px-2.5 py-1 rounded-md border border-slate-100">
                                {news.date}
                              </span>
                            </div>
                            <h4 className="font-extrabold text-slate-800 text-lg mb-3 leading-tight">{news.title}</h4>
                            <p className="text-slate-600 text-sm leading-relaxed mb-5 text-justify">{news.summary}</p>
                            <a 
                              href={news.link} 
                              target="_blank" 
                              rel="noopener noreferrer" 
                              className="flex items-center gap-2 text-blue-600 text-[10px] font-black hover:text-blue-800 uppercase tracking-widest group-hover:gap-3 transition-all"
                            >
                              Ampliar noticia en {news.source} <ExternalLink className="w-3.5 h-3.5" />
                            </a>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                );

              default:
                return null;
            }
          };

          return (
            <div className="min-h-screen bg-slate-50 font-sans text-slate-900 selection:bg-blue-200 selection:text-blue-900">
              <header className="bg-white/85 backdrop-blur-xl border-b border-slate-200 sticky top-0 z-50 px-5 py-4 flex items-center justify-between shadow-sm">
                <div className="flex items-center gap-3">
                  <div className="bg-slate-900 p-2.5 rounded-2xl shadow-lg border border-slate-700">
                    <ShieldAlert className="w-5 h-5 text-white" />
                  </div>
                  <div>
                    <h1 className="font-black text-xl tracking-tighter leading-none mb-0.5">
                      Defensa<span className="text-blue-600">Médica</span>
                    </h1>
                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em]">Huelga 2026</p>
                  </div>
                </div>
                <div className="hidden md:flex gap-4">
                  <span className="text-[10px] font-black text-slate-400 flex items-center gap-1.5 uppercase tracking-widest bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200">
                    <Activity className="w-3 h-3 text-red-500 animate-pulse" /> Monitorización Global Activa
                  </span>
                </div>
              </header>

              <main className="max-w-3xl mx-auto px-4 pt-6 md:pt-10">
                {renderContent()}
              </main>

              <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900/95 backdrop-blur-xl border border-slate-700 rounded-full px-6 py-2.5 shadow-2xl z-50 flex items-center gap-6 md:gap-10 pb-safe">
                {[
                  { id: 'home', icon: Stethoscope, label: 'Inicio' },
                  { id: 'demandas', icon: ListChecks, label: 'Las 25 Demandas' },
                  { id: 'argumentos', icon: Shield, label: '100 Argumentos' },
                  { id: 'noticias', icon: Newspaper, label: 'Actualidad' }
                ].map((tab) => (
                  <button 
                    key={tab.id}
                    onClick={() => { setActiveTab(tab.id); setSearchQuery(''); }}
                    className={`flex flex-col items-center gap-1 transition-all relative outline-none p-1.5 ${activeTab === tab.id ? 'text-blue-400 scale-110' : 'text-slate-400 hover:text-slate-200'}`}
                  >
                    <tab.icon className="w-[22px] h-[22px]" strokeWidth={activeTab === tab.id ? 2.5 : 2} />
                    <span className="text-[8px] font-black uppercase tracking-widest">{tab.label}</span>
                    {activeTab === tab.id && <span className="absolute -bottom-1.5 w-6 h-1 bg-blue-500 rounded-full blur-[2px] shadow-[0_0_8px_rgba(59,130,246,0.8)]"></span>}
                  </button>
                ))}
              </nav>

              <div id="toast" className="hidden fixed top-24 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3.5 rounded-2xl shadow-2xl items-center gap-3 z-[100] animate-in slide-in-from-top-10 border border-slate-700 transition-opacity">
                <div className="bg-emerald-500/20 p-1.5 rounded-full border border-emerald-500/50">
                  <ListChecks className="w-4 h-4 text-emerald-400" />
                </div>
                <span className="font-bold text-sm tracking-wide">Copiado de forma segura al portapapeles</span>
              </div>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
